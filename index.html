<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tabzy</title>
        <link rel="stylesheet" href="./src/tabzy.css" />
        <style>
            .tabzy--active a {
                color: pink;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <!-- Container -->
        <ul id="tabs">
            <!-- Tabs -->
            <li>
                <a href="#tab1">Tab 1</a>
            </li>
            <li>
                <a href="#tab2">Tab 2</a>
            </li>
            <li>
                <a href="#tab3">Tab 3</a>
            </li>
        </ul>

        <!-- Panels -->
        <div id="tab1">Tab1 content</div>
        <div id="tab2">Tab2 content</div>
        <div id="tab3">Tab3 content</div>
        
        <!-- Tab 2 -->
        <ul id="tabs2">
            <!-- Tabs -->
            <li>
                <a href="#tab21">Tab 1</a>
            </li>
            <li>
                <a href="#tab22">Tab 2</a>
            </li>
            <li>
                <a href="#tab23">Tab 3</a>
            </li>
        </ul>

        <!-- Panels -->
        <div id="tab21">Tab21 content</div>
        <div id="tab22">Tab22 content</div>
        <div id="tab23">Tab23 content</div>

        <script src="./src/tabzy.js"></script>
        <script>
            const tabs = new Tabzy("#tabs", {
                remember: true,
            });
            // vấn đề: k lưu hash 2 tab đc
            const tabs2 = new Tabzy("#tabs2", {
                remember: true,
            });

            const tab2 = document.querySelector('a[href="#tab2"]')
        </script>
    </body>
</html>
